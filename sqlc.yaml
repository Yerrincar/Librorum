version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/platform/storage/migrations"
    queries: "internal/platform/storage/queries"
    gen:
      go:
        package: "db"
        out: "internal/platform/storage/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
